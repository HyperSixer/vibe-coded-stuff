<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .link-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .permanent-badge {
            background: #e0f2fe;
            color: #0369a1;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">Nexus</h1>
            <p class="text-slate-600">List of links in this repository.</p>
            <p class="text-slate-400">Yes, this too is vibe-coded.</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="linkTitle" placeholder="Link Title (e.g. Google)" 
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <input type="url" id="linkUrl" placeholder="URL (https://...)" 
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <button onclick="addLink()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition duration-200">
                    Add Link
                </button>
            </div>
            <p id="errorMessage" class="text-red-500 text-sm mt-2 hidden">Please enter a valid title and URL.</p>
        </div>

        <!-- Search and Filter -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 class="text-xl font-semibold text-slate-700">Saved Links</h2>
            <input type="text" id="searchBar" onkeyup="filterLinks()" placeholder="Search your links..." 
                class="w-full md:w-64 px-4 py-2 rounded-full border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
        </div>

        <!-- Links Grid -->
        <div id="linksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Links will appear here -->
        </div>

        <!-- Empty State (Hidden if hardcoded links exist) -->
        <div id="emptyState" class="text-center py-20 text-slate-400 hidden">
            <p>No links found.</p>
        </div>
    </div>

    <script>
        // PERMANENT LINKS (Hardcoded)
        const permanentLinks = [
            {
                id: 'perm-1',
                title: 'Pong v1',
                url: 'https://hypersixer.github.io/vibe-coded-stuff/pong-v1.html',
                isPermanent: true
            }, 
            {
                id: 'perm-2',
                title: 'Notes v1',
                url: 'https://hypersixer.github.io/vibe-coded-stuff/notes-v1.html',
                isPermanent: true
            },
            {
                id: 'perm-3',
                title: 'Breakout v1',
                url: 'https://hypersixer.github.io/vibe-coded-stuff/brick-breaker-v1.html',
                isPermanent: true
            }
        ];

        // USER LINKS (From LocalStorage)
        let userLinks = [];

        window.onload = () => {
            const saved = localStorage.getItem('my_link_hub_data');
            if (saved) {
                userLinks = JSON.parse(saved);
            }
            renderLinks();
        };

        function addLink() {
            const titleInput = document.getElementById('linkTitle');
            const urlInput = document.getElementById('linkUrl');
            const error = document.getElementById('errorMessage');

            let url = urlInput.value.trim();
            const title = titleInput.value.trim();

            if (!title || !url) {
                error.classList.remove('hidden');
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            const newLink = {
                id: Date.now(),
                title: title,
                url: url,
                isPermanent: false
            };

            userLinks.unshift(newLink);
            saveAndRender();
            
            titleInput.value = '';
            urlInput.value = '';
            error.classList.add('hidden');
        }

        function deleteLink(id) {
            userLinks = userLinks.filter(link => link.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('my_link_hub_data', JSON.stringify(userLinks));
            renderLinks();
        }

        function renderLinks(filter = '') {
            const grid = document.getElementById('linksGrid');
            const empty = document.getElementById('emptyState');
            grid.innerHTML = '';

            // Combine both sets of links
            const allLinks = [...permanentLinks, ...userLinks];

            const filteredLinks = allLinks.filter(link => 
                link.title.toLowerCase().includes(filter.toLowerCase()) || 
                link.url.toLowerCase().includes(filter.toLowerCase())
            );

            if (filteredLinks.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                filteredLinks.forEach(link => {
                    const card = document.createElement('div');
                    card.className = `link-card bg-white p-5 rounded-xl border ${link.isPermanent ? 'border-blue-200' : 'border-slate-200'} flex flex-col justify-between`;
                    
                    const deleteBtn = link.isPermanent 
                        ? `<span class="permanent-badge">Core</span>` 
                        : `<button onclick="deleteLink(${link.id})" class="text-slate-400 hover:text-red-500 transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                           </button>`;

                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-slate-800 truncate pr-2" title="${link.title}">${link.title}</h3>
                                ${deleteBtn}
                            </div>
                            <p class="text-xs text-blue-500 truncate mb-4">${link.url}</p>
                        </div>
                        <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                           class="inline-block text-center w-full py-2 ${link.isPermanent ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-slate-50 text-slate-700 hover:bg-slate-100'} text-sm font-medium rounded-lg transition">
                           Visit Site
                        </a>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        function filterLinks() {
            const query = document.getElementById('searchBar').value;
            renderLinks(query);
        }
    </script>
</body>
</html>
